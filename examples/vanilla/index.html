<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeus Web - Vanilla Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 2rem; background: #f5f5f5; color: #333; }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
    section { background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); max-width: 400px; }
    h2 { font-size: 1rem; margin-bottom: 1rem; color: #666; }
    p { margin-top: 1rem; font-size: .875rem; color: #666; }
    span { color: #333; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Zeus Web - Vanilla Demo</h1>

  <section>
    <h2>Input 组件（无框架）</h2>
    <zw-input
      id="my-input"
      placeholder="请输入内容..."
    ></zw-input>
    <p>当前值: <span id="value-display"></span></p>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
