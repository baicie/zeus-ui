name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.0-beta.0 or 0.1.0'
        required: true
        type: string
      tag:
        description: npm dist-tag
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest
      dry_run:
        description: Run with --dry-run (no commit, no publish)
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Dry-run release
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          pnpm release \
            ${{ github.event.inputs.version }} \
            --tag ${{ github.event.inputs.tag }} \
            --dry

      - name: Release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          pnpm release \
            ${{ github.event.inputs.version }} \
            --tag ${{ github.event.inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create default tag for publish trigger
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git tag default@${{ github.event.inputs.version }}
          git push origin default@${{ github.event.inputs.version }}
