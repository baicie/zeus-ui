name: Zeus Canary Compatibility

on:
  repository_dispatch:
    types:
      - zeus-canary-published

  workflow_dispatch:

  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: zeus-canary-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    runs-on: ubuntu-latest

    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Print dispatch payload
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "source=${{ github.event.client_payload.source }}"
          echo "sha=${{ github.event.client_payload.sha }}"
          echo "version=${{ github.event.client_payload.version }}"

      - name: Resolve Zeus version
        shell: bash
        run: |
          VERSION='${{ github.event.client_payload.version }}'

          if [ -z "$VERSION" ]; then
            VERSION='canary'
          fi

          echo "ZEUS_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Testing Zeus version: $VERSION"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check workspace overrides
        run: pnpm check:workspace-overrides

      - name: Check Zeus baseline
        run: pnpm check:zeus-baseline

      - name: Relax Zeus peer ranges for selected canary
        shell: bash
        run: |
          node --input-type=module -e "
            import fs from 'node:fs'

            for (const file of [
              'packages/zeus-compat/package.json',
              'packages/primitives/input/package.json',
            ]) {
              const pkg = JSON.parse(fs.readFileSync(file, 'utf8'))
              pkg.peerDependencies['@zeus-js/zeus'] = '*'
              fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`)
            }
          "

      - name: Install selected Zeus packages
        # Intentionally mutates package.json / pnpm-lock.yaml in the CI workspace only.
        run: |
          pnpm add -Dw \
            "@zeus-js/zeus@${ZEUS_VERSION}" \
            "@zeus-js/runtime-dom@${ZEUS_VERSION}" \
            "@zeus-js/signal@${ZEUS_VERSION}" \
            "@zeus-js/compiler@${ZEUS_VERSION}" \
            "@zeus-js/component-analyzer@${ZEUS_VERSION}" \
            "@zeus-js/component-dts@${ZEUS_VERSION}" \
            "@zeus-js/bundler-plugin@${ZEUS_VERSION}" \
            "@zeus-js/output-wc@${ZEUS_VERSION}" \
            "@zeus-js/output-react-wrapper@${ZEUS_VERSION}" \
            "@zeus-js/output-vue-wrapper@${ZEUS_VERSION}" \
            "@zeus-js/output-css@${ZEUS_VERSION}" \
            "@zeus-js/output-icons@${ZEUS_VERSION}" \
            "@zeus-js/preset-component-library@${ZEUS_VERSION}" \
            "@zeus-js/vite-plugin@${ZEUS_VERSION}" \
            --save-exact

      - name: Verify installed Zeus version
        shell: bash
        run: |
          if [ "$ZEUS_VERSION" = "canary" ]; then
            exit 0
          fi

          node --input-type=module -e "
            import fs from 'node:fs'

            const pkg = JSON.parse(
              fs.readFileSync(
                'node_modules/@zeus-js/zeus/package.json',
                'utf8',
              ),
            )

            if (pkg.version !== process.env.ZEUS_VERSION) {
              console.error(
                \`Expected @zeus-js/zeus@\${process.env.ZEUS_VERSION}, got \${pkg.version}\`,
              )
              process.exit(1)
            }

            console.log(\`Verified @zeus-js/zeus@\${pkg.version}\`)
          "

      - name: Print Zeus versions
        run: |
          pnpm list \
            @zeus-js/zeus \
            @zeus-js/bundler-plugin \
            @zeus-js/output-wc \
            @zeus-js/runtime-dom

      - name: Check import boundaries
        run: pnpm check:zeus-imports

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test-unit

      - name: Zeus capabilities contract
        run: pnpm vitest run --project canary

      - name: Build packages
        run: pnpm build

      - name: Check package exports
        run: pnpm check:exports

      - name: Check build output
        run: pnpm check:build-output
