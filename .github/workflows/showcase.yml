name: showcase

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: showcase-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'true'
  CI: 'true'

jobs:
  metadata:
    name: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate showcase metadata and implementation
        run: pnpm showcase:ci:metadata

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run React and Vue showcase unit tests
        run: pnpm showcase:ci:unit

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build React and Vue showcase
        run: pnpm showcase:ci:build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - metadata
      - unit
      - build

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run showcase browser E2E
        env:
          SHOWCASE_E2E_ARTIFACTS: 'true'
        run: pnpm showcase:ci:e2e

      - name: Upload showcase E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: showcase-e2e-artifacts
          path: |
            examples/showcase-e2e/.artifacts
          if-no-files-found: ignore
          retention-days: 7
