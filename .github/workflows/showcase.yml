name: showcase

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: showcase-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'true'
  CI: 'true'

jobs:
  metadata:
    name: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate showcase metadata and implementation
        run: pnpm showcase:ci:metadata

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare showcase unit artifacts directory
        run: mkdir -p examples/showcase-unit/.artifacts

      - name: Run React showcase unit tests
        run: pnpm showcase:test:react -- --run --reporter=verbose 2>&1 | tee examples/showcase-unit/.artifacts/react-unit.log

      - name: Run Vue showcase unit tests
        run: pnpm showcase:test:vue -- --run --reporter=verbose 2>&1 | tee examples/showcase-unit/.artifacts/vue-unit.log

      - name: Run Native showcase unit tests
        run: pnpm showcase:test:native -- --run --reporter=verbose 2>&1 | tee examples/showcase-unit/.artifacts/native-unit.log

      - name: Run Advanced showcase unit tests
        run: pnpm showcase:test:advanced -- --run --reporter=verbose 2>&1 | tee examples/showcase-unit/.artifacts/advanced-unit.log

      - name: Upload showcase unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: showcase-unit-artifacts
          path: |
            examples/showcase-unit/.artifacts
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build showcase apps
        run: pnpm showcase:ci:build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - metadata
      - unit
      - build

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Set Playwright cache path and version
        run: |
          echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/playwright-bin" >> "$GITHUB_ENV"
          PLAYWRIGHT_VERSION="$(node -p "require('./node_modules/@playwright/test/package.json').version")"
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-playwright-bin-v1-${{ env.PLAYWRIGHT_VERSION }}
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          restore-keys: |
            ${{ runner.os }}-playwright-bin-v1-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare showcase E2E artifacts directory
        run: mkdir -p e2e/showcase/.artifacts

      - name: Build showcase E2E dependencies
        run: pnpm showcase:e2e:deps 2>&1 | tee e2e/showcase/.artifacts/deps.log

      - name: Run showcase browser E2E
        env:
          SHOWCASE_E2E_ARTIFACTS: 'true'
        run: pnpm exec vitest --project showcase-e2e --run --reporter=verbose 2>&1 | tee e2e/showcase/.artifacts/e2e.log

      - name: Upload showcase E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: showcase-e2e-artifacts
          path: |
            e2e/showcase/.artifacts
          if-no-files-found: ignore
          retention-days: 7
